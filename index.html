<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Wedding Page</title>
</head>
<body>
  <h1>ようこそ</h1>
  <p id="message">通常メッセージ：このページへようこそ。</p>

  <!-- ✅ スクリプトはこの位置（</body>の直前）に入れる -->
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("from") === "nfc") {
      document.getElementById("message").innerText =
        "Here is our master`s voice!";
    }
  </script>
</body>
</html>
